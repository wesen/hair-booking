<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Case 04 (original) — cascade</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
        background: #0b1020;
        color: white;
      }

      /* Lower specificity */
      .box {
        width: 520px;
        padding: 22px;
        border-radius: 14px;
        background: #111b30;
        border: 2px solid #334155;
        color: #60a5fa;
      }

      /* Higher specificity via ID wins for color */
      #box {
        color: #f59e0b;
      }

      /* !important beats higher specificity for border-color */
      .box {
        border-color: #22c55e !important;
      }
    </style>
  </head>
  <body>
    <div class="box" id="box">
      <h2 style="margin: 0 0 8px 0">Cascade baseline</h2>
      <div id="note">This case exercises specificity vs !important.</div>
    </div>
  </body>
</html>
