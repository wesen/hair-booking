<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Case 02 (original) — typography</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
        background: #0b1220;
      }
      #card {
        width: 640px;
        background: #111b30;
        color: #e7eefc;
        border-radius: 16px;
        padding: 26px 28px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      }
      #card h2 {
        margin: 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.4px;
      }
      #card .subtitle {
        margin-top: 10px;
        font-size: 15px;
        line-height: 1.55;
        color: #b7c4e3;
      }
    </style>
  </head>
  <body>
    <section id="card">
      <h2 id="heading">Typography Baseline</h2>
      <div class="subtitle" id="subtitle">
        This case changes font-size/weight/line-height to create subtle, widespread diffs.
      </div>
    </section>
  </body>
</html>
