<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Case 03 (original) — color</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
        background: #0f172a;
      }
      #banner {
        width: 720px;
        border-radius: 18px;
        padding: 26px 28px;
        color: white;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
      }
      #banner .pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="banner">
      <div class="pill" id="pill">Gradient</div>
      <h1 style="margin: 12px 0 0 0">Color baseline</h1>
    </div>
  </body>
</html>
