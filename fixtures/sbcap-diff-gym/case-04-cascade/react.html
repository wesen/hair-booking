<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Case 04 (react) — cascade</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
        background: #0b1020;
        color: white;
      }

      /* Lower specificity */
      .Box {
        width: 520px;
        padding: 22px;
        border-radius: 14px;
        background: #111b30;
        border: 2px solid #334155;
        color: #60a5fa;
      }

      /* !important now sets the text color (wins) */
      .Box {
        color: #ef4444 !important;
      }

      /* Higher specificity via ID would otherwise win, but is not important */
      #box2 {
        color: #f59e0b;
      }

      /* Border-color: later non-important wins only if no important */
      .Box {
        border-color: #a855f7;
      }
    </style>
  </head>
  <body>
    <div class="Box" id="box2">
      <h2 style="margin: 0 0 8px 0">Cascade baseline</h2>
      <div class="Note">This case exercises specificity vs !important.</div>
    </div>
  </body>
</html>
